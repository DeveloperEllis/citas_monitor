name: Monitor Cita Embajada España

on:
  schedule:
    - cron: '*/2 * * * *'   # Cada 2 minutos (GitHub mín ~5 min real)
  workflow_dispatch:          # Ejecutar manualmente desde GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Necesario para hacer git push del state.txt

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar dependencias del sistema para Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0t64 \
            libatk1.0-0t64 \
            libcups2t64 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0t64 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libx11-6 \
            libxcomposite1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xvfb

      - name: Instalar Chromium para Playwright
        run: playwright install chromium

      - name: Ejecutar monitor
        run: python monitor.py
        env:
          TARGET_URL:       ${{ secrets.TARGET_URL }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
