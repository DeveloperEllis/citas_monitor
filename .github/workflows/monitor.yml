name: Monitor Cita Embajada España

on:
  schedule:
    - cron: '*/5 * * * *'   # Cada 5 minutos
  workflow_dispatch:          # Ejecutar manualmente desde GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Necesario para hacer git push del state.txt

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Chromium para Playwright
        run: playwright install --with-deps chromium

      - name: Ejecutar monitor
        run: python monitor.py
        env:
          TARGET_URL:       ${{ secrets.TARGET_URL }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
